<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СУЛТАН - Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at 30% 20%, #2a1508 0%, #0a0502 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', 'Playfair Display', sans-serif;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(212, 175, 55, 0.08) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
        }
        
        .auth-box {
            background: rgba(10, 6, 4, 0.92);
            backdrop-filter: blur(12px);
            padding: 45px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 70px rgba(212, 175, 55, 0.35);
            border: 2px solid #d4af37;
        }
        
        h1 {
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 38px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
            font-family: 'Oswald', sans-serif;
        }
        
        .subtitle {
            color: #c9af7b;
            margin-bottom: 35px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
        }
        
        .tab.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        input {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            background: rgba(30, 20, 12, 0.8);
            border: 1.5px solid #997a00;
            border-radius: 50px;
            color: #faf4e0;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Roboto', sans-serif;
        }
        
        input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            background: rgba(30, 20, 12, 0.95);
        }
        
        input::placeholder {
            color: #8a7a5a;
        }
        
        button {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1.5px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            background: linear-gradient(135deg, #e8c547 0%, #cc9a1a 100%);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            min-height: 50px;
        }
        
        .message.error {
            background: rgba(139, 0, 0, 0.3);
            color: #ff8888;
            border: 1px solid #8b0000;
        }
        
        .message.success {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            border: 1px solid #d4af37;
        }
        
        .rules {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 13px;
            color: #aa9977;
            text-align: left;
        }
        
        .rules h3 {
            color: #d4af37;
            margin-bottom: 12px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        
        .rules p {
            margin: 8px 0;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a0f08;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1>🎴 SULTAN</h1>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм" maxlength="12" autocomplete="username">
                <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
                <button onclick="login()">🎮 Войти в игру</button>
            </div>
            
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм (3-12 символов)" maxlength="12" autocomplete="username">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 3 символа)" autocomplete="new-password">
                <input type="password" id="regConfirm" placeholder="Подтвердите пароль" autocomplete="new-password">
                <button onclick="register()">📝 Зарегистрироваться</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="rules">
                <h3>📜 ПРАВИЛА</h3>
                <p>♢ Козырь: <span style="color:#d4af37">БУБНЫ</span></p>
                <p>♠ Пики бьются только пиками</p>
                <p>♕ Дама завершает ход</p>
                <p>🎯 Первый ход: у кого 6♦</p>
                <p>👥 Игра на 3 игроков</p>
                <p>💰 Вход в игру стоит 500 кранов</p>
            </div>
        </div>
    </div>
    
    <script>
        let isLoading = false;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('registerForm').classList.remove('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                document.getElementById('loginForm').classList.remove('active');
            }
            showMessage('', '');
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }
        
        async function register() {
            if (isLoading) return;
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!username || !password || !confirm) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            if (username.length < 3 || username.length > 12) {
                showMessage('Никнейм должен быть от 3 до 12 символов', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('Пароль должен быть не менее 3 символов', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('Пароли не совпадают', 'error');
                return;
            }
            isLoading = true;
            const btn = document.querySelector('#registerForm button');
            btn.disabled = true;
            btn.innerHTML = 'Регистрация...';
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('✅ Регистрация успешна! Теперь войдите в систему', 'success');
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').value = '';
                    }, 2000);
                } else {
                    showMessage(data.error || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                showMessage('Ошибка соединения с сервером', 'error');
            } finally {
                isLoading = false;
                btn.disabled = false;
                btn.innerHTML = '📝 Зарегистрироваться';
            }
        }
        
        async function login() {
            if (isLoading) return;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            isLoading = true;
            const btn = document.querySelector('#loginForm button');
            btn.disabled = true;
            btn.innerHTML = 'Вход...';
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('✅ Вход выполнен! Перенаправление...', 'success');
                    sessionStorage.setItem('playerName', username);
                    setTimeout(() => {
                        window.location.href = '/lobby.html';
                    }, 1000);
                } else {
                    showMessage(data.error || 'Ошибка входа', 'error');
                }
            } catch (error) {
                showMessage('Ошибка соединения с сервером', 'error');
            } finally {
                isLoading = false;
                btn.disabled = false;
                btn.innerHTML = '🎮 Войти в игру';
            }
        }
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                if (data.authenticated) {
                    sessionStorage.setItem('playerName', data.username);
                    window.location.href = '/lobby.html';
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
            }
        }
        checkAuth();
    </script>
</body>
</html>
