<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>СУЛТАН - Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at 30% 20%, #2a1508 0%, #0a0502 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', 'Playfair Display', sans-serif;
            padding: clamp(10px, 3vw, 20px);
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(212, 175, 55, 0.08) 2px, transparent 2px);
            background-size: clamp(30px, 8vw, 50px) clamp(30px, 8vw, 50px);
            pointer-events: none;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
        }
        
        .auth-box {
            background: rgba(10, 6, 4, 0.92);
            backdrop-filter: blur(12px);
            padding: clamp(25px, 6vw, 45px);
            border-radius: clamp(30px, 8vw, 40px);
            text-align: center;
            box-shadow: 0 0 70px rgba(212, 175, 55, 0.35);
            border: 2px solid #d4af37;
        }
        
        h1 {
            color: #d4af37;
            margin-bottom: 8px;
            font-size: clamp(28px, 8vw, 38px);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
            font-family: 'Oswald', sans-serif;
        }
        
        .subtitle {
            color: #c9af7b;
            margin-bottom: 35px;
            font-size: clamp(12px, 3vw, 14px);
            letter-spacing: 1px;
        }
        
        .vk-badge {
            display: inline-block;
            background: #4c6b8a;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 8px;
            vertical-align: middle;
            font-weight: bold;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
        }
        
        .tab {
            flex: 1;
            padding: clamp(10px, 3vw, 12px);
            background: none;
            border: none;
            color: #aaa;
            font-size: clamp(16px, 4vw, 18px);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
        }
        
        .tab.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        input {
            width: 100%;
            padding: clamp(14px, 4vw, 16px);
            margin: 15px 0;
            background: rgba(30, 20, 12, 0.8);
            border: 1.5px solid #997a00;
            border-radius: 50px;
            color: #faf4e0;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Roboto', sans-serif;
        }
        
        input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            background: rgba(30, 20, 12, 0.95);
        }
        
        input::placeholder {
            color: #8a7a5a;
        }
        
        button {
            width: 100%;
            padding: clamp(14px, 4vw, 16px);
            margin: 15px 0;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #1a0f08;
            border: none;
            border-radius: 50px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1.5px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            background: linear-gradient(135deg, #e8c547 0%, #cc9a1a 100%);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .vk-quick-btn {
            background: linear-gradient(135deg, #4c6b8a, #2a4a6a);
            margin-top: 5px;
            position: relative;
            padding-left: 50px;
        }
        
        .vk-quick-btn::before {
            content: "VK";
            position: absolute;
            left: 20px;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }
        
        .separator {
            margin: 10px 0;
            color: #aa9977;
            font-size: 12px;
            position: relative;
            text-align: center;
        }
        
        .separator::before,
        .separator::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(212, 175, 55, 0.3);
        }
        
        .separator::before {
            left: 0;
        }
        
        .separator::after {
            right: 0;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            font-size: clamp(12px, 3vw, 14px);
            min-height: 50px;
        }
        
        .message.error {
            background: rgba(139, 0, 0, 0.3);
            color: #ff8888;
            border: 1px solid #8b0000;
        }
        
        .message.success {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            border: 1px solid #d4af37;
        }
        
        .rules {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            font-size: clamp(11px, 3vw, 13px);
            color: #aa9977;
            text-align: left;
        }
        
        .rules h3 {
            color: #d4af37;
            margin-bottom: 12px;
            font-size: clamp(14px, 4vw, 16px);
            letter-spacing: 1px;
        }
        
        .rules p {
            margin: 8px 0;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1a0f08;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .auth-box {
                padding: 25px 20px;
            }
            
            .tabs {
                gap: 5px;
            }
            
            .tab {
                padding: 8px;
                font-size: 14px;
            }
            
            .vk-quick-btn::before {
                content: "⚡";
                left: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1>♠ SULTAN ♠</h1>
            <div class="subtitle">
                Карточная игра
                <span id="platformBadge" class="vk-badge" style="display: none;">VK</span>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <div id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Никнейм" maxlength="12" autocomplete="username">
                <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
                <button onclick="login()">🎮 Войти в игру</button>
                
                <div id="vkLoginContainer" style="display: none;">
                    <div class="separator">или</div>
                    <button class="vk-quick-btn" onclick="vkQuickLogin()" id="vkLoginBtn">
                        Войти через VK
                    </button>
                </div>
            </div>
            
            <div id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Никнейм (3-12 символов)" maxlength="12" autocomplete="username">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 3 символа)" autocomplete="new-password">
                <input type="password" id="regConfirm" placeholder="Подтвердите пароль" autocomplete="new-password">
                <button onclick="register()">📝 Зарегистрироваться</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="rules">
                <h3>📜 ПРАВИЛА</h3>
                <p>♢ Козырь: <span style="color:#d4af37">БУБНЫ</span></p>
                <p>♠ Пики бьются только пиками</p>
                <p>♕ Дама завершает ход</p>
                <p>🎯 Первый ход: у кого 6♦</p>
                <p>👥 Игра на 3 игроков</p>
                <p>💰 Вход в игру стоит 500 кранов</p>
            </div>
        </div>
    </div>
    
    <script>
        let isLoading = false;
        let isVkEnvironment = false;
        let vkUserData = null;
        
        // ============ ОБНАРУЖЕНИЕ ОКРУЖЕНИЯ ============
        function detectVkEnvironment() {
            const urlParams = new URLSearchParams(window.location.search);
            const isVkFromUrl = urlParams.has('vk_user_id') || 
                                urlParams.has('vk_access_token_settings') ||
                                navigator.userAgent.includes('VK');
            
            const isInIframe = window !== window.top;
            const isVkIframe = isInIframe && document.referrer.includes('vk.com');
            
            isVkEnvironment = isVkFromUrl || isVkIframe;
            
            if (isVkEnvironment) {
                console.log('✅ Обнаружено окружение VK');
                document.getElementById('platformBadge').style.display = 'inline-block';
                document.getElementById('vkLoginContainer').style.display = 'block';
                tryLoadVkBridge();
            } else {
                console.log('📱 Обычный режим (без VK)');
            }
        }
        
        // ============ ЗАГРУЗКА VK BRIDGE ============
        function tryLoadVkBridge() {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js';
            script.onload = () => {
                console.log('✅ VK Bridge загружен');
                window.vkBridge = window.vkBridge || window.vkBridge;
                initVkBridge();
            };
            script.onerror = () => {
                console.warn('⚠️ Не удалось загрузить VK Bridge, работаем в обычном режиме');
                isVkEnvironment = false;
                document.getElementById('platformBadge').style.display = 'none';
                document.getElementById('vkLoginContainer').style.display = 'none';
            };
            document.head.appendChild(script);
        }
        
        async function initVkBridge() {
            try {
                if (!window.vkBridge) return;
                
                const initResult = await window.vkBridge.send('VKWebAppInit');
                console.log('VK Bridge инициализирован:', initResult);
                
                const launchParams = await window.vkBridge.send('VKWebAppGetLaunchParams');
                console.log('Параметры запуска:', launchParams);
                
                if (launchParams.vk_user_id) {
                    vkUserData = {
                        id: launchParams.vk_user_id,
                        platform: launchParams.vk_platform
                    };
                    
                    try {
                        const userInfo = await window.vkBridge.send('VKWebAppGetUserInfo', {
                            user_id: launchParams.vk_user_id
                        });
                        vkUserData.first_name = userInfo.first_name;
                        vkUserData.last_name = userInfo.last_name;
                        vkUserData.photo = userInfo.photo_200;
                        console.log('Информация о пользователе VK:', userInfo);
                    } catch (e) {
                        console.warn('Не удалось получить информацию о пользователе:', e);
                        vkUserData.first_name = 'VK';
                        vkUserData.last_name = 'User';
                    }
                    
                    document.getElementById('vkLoginContainer').style.display = 'block';
                }
            } catch (error) {
                console.warn('Ошибка инициализации VK Bridge:', error);
                isVkEnvironment = false;
                document.getElementById('platformBadge').style.display = 'none';
                document.getElementById('vkLoginContainer').style.display = 'none';
            }
        }
        
        // ============ ВХОД ЧЕРЕЗ VK ============
        async function vkQuickLogin() {
            if (isLoading) return;
            if (!vkUserData || !vkUserData.id) {
                showMessage('Ошибка VK авторизации', 'error');
                return;
            }
            
            isLoading = true;
            const btn = document.getElementById('vkLoginBtn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = 'Вход через VK...';
            }
            
            try {
                const response = await fetch('/api/auth/vk-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vk_id: vkUserData.id,
                        first_name: vkUserData.first_name || 'VK',
                        last_name: vkUserData.last_name || 'User',
                        photo: vkUserData.photo || ''
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Вход через VK выполнен!', 'success');
                    sessionStorage.setItem('playerName', data.username);
                    sessionStorage.setItem('isVkUser', 'true');
                    sessionStorage.setItem('vkUserId', vkUserData.id);
                    
                    setTimeout(() => {
                        window.location.href = '/lobby.html';
                    }, 1000);
                } else {
                    showMessage(data.error || 'Ошибка VK входа', 'error');
                }
            } catch (error) {
                console.error('Ошибка VK входа:', error);
                showMessage('Ошибка соединения с сервером', 'error');
            } finally {
                isLoading = false;
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Войти через VK';
                }
            }
        }
        
        // ============ ОБЫЧНАЯ АВТОРИЗАЦИЯ ============
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('registerForm').classList.remove('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                document.getElementById('loginForm').classList.remove('active');
            }
            showMessage('', '');
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                if (msgDiv.textContent === text) {
                    msgDiv.textContent = '';
                    msgDiv.className = 'message';
                }
            }, 3000);
        }
        
        async function register() {
            if (isLoading) return;
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !password || !confirm) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            if (username.length < 3 || username.length > 12) {
                showMessage('Никнейм должен быть от 3 до 12 символов', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('Пароль должен быть не менее 3 символов', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('Пароли не совпадают', 'error');
                return;
            }
            
            isLoading = true;
            const btn = document.querySelector('#registerForm button');
            btn.disabled = true;
            btn.innerHTML = 'Регистрация...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('✅ Регистрация успешна! Теперь войдите в систему', 'success');
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').value = '';
                    }, 2000);
                } else {
                    showMessage(data.error || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                showMessage('Ошибка соединения с сервером', 'error');
            } finally {
                isLoading = false;
                btn.disabled = false;
                btn.innerHTML = '📝 Зарегистрироваться';
            }
        }
        
        async function login() {
            if (isLoading) return;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            isLoading = true;
            const btn = document.querySelector('#loginForm button:not(.vk-quick-btn)');
            btn.disabled = true;
            btn.innerHTML = 'Вход...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('✅ Вход выполнен! Перенаправление...', 'success');
                    sessionStorage.setItem('playerName', username);
                    sessionStorage.setItem('isVkUser', 'false');
                    
                    setTimeout(() => {
                        window.location.href = '/lobby.html';
                    }, 1000);
                } else {
                    showMessage(data.error || 'Ошибка входа', 'error');
                }
            } catch (error) {
                showMessage('Ошибка соединения с сервером', 'error');
            } finally {
                isLoading = false;
                btn.disabled = false;
                btn.innerHTML = '🎮 Войти в игру';
            }
        }
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();
                if (data.authenticated) {
                    sessionStorage.setItem('playerName', data.username);
                    window.location.href = '/lobby.html';
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
            }
        }
        
        // Обработчики клавиш
        document.getElementById('loginUsername')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('regConfirm')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        
        // Инициализация
        detectVkEnvironment();
        checkAuth();
        
        // Глобальные функции
        window.switchTab = switchTab;
        window.register = register;
        window.login = login;
        window.vkQuickLogin = vkQuickLogin;
    </script>
</body>
</html>
